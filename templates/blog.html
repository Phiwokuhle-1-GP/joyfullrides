<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blog | Joyfull Rides Shuttle</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light fixed-top nav-light">
  <div class="container">
    <a class="navbar-brand brand-block" href="/" aria-label="Joyfull Rides Shuttles">
      <img src="/static/logo.jpg" alt="Joyfull Rides Logo" class="brand-logo">
      <span class="brand-lines">
        <span class="brand-title">JOYFUL RIDES SHUTTLES</span>
        <span class="brand-subtitle">SAFE, RELIABLE AND ON TIME.</span>
      </span>
    </a>

    <div class="ms-auto d-flex gap-2">
      <a class="btn btn-outline-secondary btn-sm" href="/">Home</a>
      <a class="btn btn-accent btn-sm" href="/#routes">Request Quote</a>
    </div>
  </div>
</nav>

<section class="section" style="padding-top: 24px;">
  <div class="container">
    <div class="d-flex flex-wrap justify-content-between align-items-end gap-2 mb-3">
      <div>
        <h2 class="fw-bold mb-1">Blog</h2>
        <p class="text-muted mb-0">Safety tips and parent-friendly transport insights.</p>
      </div>
      <a class="btn btn-outline-accent" href="/soe">Soe Route (Alias)</a>
    </div>

    <div class="row g-3">
      {% for p in posts %}
      <div class="col-md-6 col-lg-4">
        <div class="card card-elevate h-100 overflow-hidden">

          <!-- ✅ Uniform cover container (ZOOM OUT) -->
          <div class="blog-cover-wrap">
            <img
              class="blog-cover"
              src="{{ p.cover }}"
              alt="{{ p.title }}"
              loading="lazy"
            >
          </div>

          <div class="p-4">
            <div class="d-flex align-items-center gap-2 mb-2">
              <span class="badge badge-accent">{{ p.category }}</span>
              <span class="text-muted small">{{ p.date }} • {{ p.read_time }}</span>
            </div>

            <h5 class="fw-bold mb-2">{{ p.title }}</h5>
            <p class="text-muted mb-3">{{ p.excerpt }}</p>
            <a class="btn btn-outline-accent w-100" href="/blog/{{ p.slug }}">Read more</a>
          </div>

        </div>
      </div>
      {% endfor %}
    </div>

  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
